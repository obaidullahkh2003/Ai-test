services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: parts_store
      POSTGRES_USER: parts
      POSTGRES_PASSWORD: parts
    ports: ["5432:5432"]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: ["8081:8080"]

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/parts_store
      DB_USER: parts
      DB_PASSWORD: parts
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/parts-store
    depends_on: [postgres, keycloak]
    ports: ["8080:8080"]

  frontend:
    build: ./frontend
    depends_on: [backend]
    ports: ["4200:80"]
