services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: partsdb
      POSTGRES_USER: parts
      POSTGRES_PASSWORD: parts
    ports: ["5432:5432"]
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports: ["8081:8080"]
  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/partsdb
    depends_on: [postgres, keycloak]
    ports: ["8080:8080"]
  frontend:
    build: ./frontend
    depends_on: [backend]
    ports: ["4200:80"]
