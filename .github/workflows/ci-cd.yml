name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Run unit/integration tests
        run: mvn -B test

  build-images:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t computer-parts-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t computer-parts-frontend:ci ./frontend

  helm-lint:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint ./helm/computer-parts-store
