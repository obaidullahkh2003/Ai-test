spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/parts_store}
    username: ${DB_USER:store}
    password: ${DB_PASSWORD:store}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8081/realms/parts-store}
server:
  port: 8080
logging:
  level:
    com.store: INFO
