spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/parts_store}
    username: ${DB_USER:parts}
    password: ${DB_PASSWORD:parts}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8080

logging:
  level:
    org.springframework.security: INFO

spring.security.oauth2.resourceserver.jwt.issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8081/realms/parts-store}
